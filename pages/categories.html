<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h1 class="section-title">🎨 Browse by Category</h1>

            <div class="categories-grid">
                <div class="category-card" style="background: var(--primary-pink);" data-category="Fruits">
                    <span class="category-emoji">🍎</span>
                    <h3>Fruits</h3>
                </div>
                <div class="category-card" style="background: var(--primary-green);" data-category="Vegetables">
                    <span class="category-emoji">🥕</span>
                    <h3>Vegetables</h3>
                </div>
                <div class="category-card" style="background: var(--primary-blue);" data-category="Dairy">
                    <span class="category-emoji">🥛</span>
                    <h3>Dairy</h3>
                </div>
                <div class="category-card" style="background: var(--primary-yellow);" data-category="Snacks">
                    <span class="category-emoji">🍪</span>
                    <h3>Snacks</h3>
                </div>
                <div class="category-card" style="background: var(--primary-orange);" data-category="Beverages">
                    <span class="category-emoji">🧃</span>
                    <h3>Beverages</h3>
                </div>
            </div>

            <div id="categoryProducts" style="margin-top: 3rem;">
                <h2 class="section-title" id="categoryTitle" style="display: none;"></h2>
                <div class="products-grid" id="productsGrid"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const categoryCards = document.querySelectorAll('.category-card');
            const categoryTitle = document.getElementById('categoryTitle');
            const productsGrid = document.getElementById('productsGrid');

            const urlParams = new URLSearchParams(window.location.search);
            const categoryFromUrl = urlParams.get('category');

            if (categoryFromUrl) {
                loadCategoryProducts(categoryFromUrl);
            }

            categoryCards.forEach(card => {
                card.addEventListener('click', function() {
                    const category = this.dataset.category;
                    loadCategoryProducts(category);
                    
                    document.querySelector('#categoryProducts').scrollIntoView({ 
                        behavior: 'smooth' 
                    });
                });
            });

            function loadCategoryProducts(category) {
                const products = getProductsByCategory(category);
                categoryTitle.textContent = `${category} (${products.length} items)`;
                categoryTitle.style.display = 'block';
                renderProductGrid(products, 'productsGrid');
            }
        });
    </script>
</body>
</html>
