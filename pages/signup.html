<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="auth-container">
        <h2 class="auth-title">Join Happy Groceries! 🎉</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone number" required maxlength="10">
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                    <button type="button" class="toggle-password-btn" id="togglePassword">👁️</button>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <div class="password-toggle">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
                    <button type="button" class="toggle-password-btn" id="toggleConfirmPassword">👁️</button>
                </div>
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn-submit" id="signupBtn" disabled>Sign Up</button>

            <div class="auth-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }

            const signupForm = document.getElementById('signupForm');
            const nameInput = document.getElementById('name');
            const phoneInput = document.getElementById('phone');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const signupBtn = document.getElementById('signupBtn');
            const strengthBar = document.getElementById('strengthBar');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const toggleConfirmPasswordBtn = document.getElementById('toggleConfirmPassword');

            const nameError = document.getElementById('nameError');
            const phoneError = document.getElementById('phoneError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmPasswordError = document.getElementById('confirmPasswordError');

            // Real-time validation functions
            function validateNameField() {
                const name = nameInput.value.trim();
                if (name && name.length < 3) {
                    nameError.textContent = 'Name must be at least 3 characters';
                    nameError.classList.add('show');
                    return false;
                } else {
                    nameError.classList.remove('show');
                    return name.length >= 3;
                }
            }

            function validatePhoneField() {
                const phone = phoneInput.value.trim();
                if (phone && !validatePhone(phone)) {
                    phoneError.textContent = 'Phone must be exactly 10 digits';
                    phoneError.classList.add('show');
                    return false;
                } else {
                    phoneError.classList.remove('show');
                    return validatePhone(phone);
                }
            }

            function validateEmailField() {
                const email = emailInput.value.trim();
                if (email && !validateEmail(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.classList.add('show');
                    return false;
                } else {
                    emailError.classList.remove('show');
                    return true;
                }
            }

            function validatePasswordField() {
                const password = passwordInput.value;
                const strength = getPasswordStrength(password);
                strengthBar.className = 'password-strength-bar ' + strength;

                if (password && password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.classList.add('show');
                    return false;
                } else {
                    passwordError.classList.remove('show');
                    return password.length >= 6;
                }
            }

            function validateConfirmPasswordField() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                if (confirmPassword && password !== confirmPassword) {
                    confirmPasswordError.textContent = 'Passwords do not match';
                    confirmPasswordError.classList.add('show');
                    return false;
                } else {
                    confirmPasswordError.classList.remove('show');
                    return password === confirmPassword && confirmPassword.length > 0;
                }
            }

            function checkFormValidity() {
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                let isValid = true;

                if (name.length < 3) isValid = false;
                if (!validatePhone(phone)) isValid = false;
                if (email && !validateEmail(email)) isValid = false;
                if (password.length < 6) isValid = false;
                if (password !== confirmPassword) isValid = false;

                signupBtn.disabled = !isValid;
                return isValid;
            }

            phoneInput.addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
                validatePhoneField();
                checkFormValidity();
            });

            passwordInput.addEventListener('input', function() {
                validatePasswordField();
                validateConfirmPasswordField();
                checkFormValidity();
            });

            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
            });

            toggleConfirmPasswordBtn.addEventListener('click', function() {
                const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
                confirmPasswordInput.type = type;
                toggleConfirmPasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
            });

            nameInput.addEventListener('input', function() {
                validateNameField();
                checkFormValidity();
            });

            nameInput.addEventListener('blur', validateNameField);

            emailInput.addEventListener('input', function() {
                validateEmailField();
                checkFormValidity();
            });

            emailInput.addEventListener('blur', validateEmailField);

            confirmPasswordInput.addEventListener('input', function() {
                validateConfirmPasswordField();
                checkFormValidity();
            });

            confirmPasswordInput.addEventListener('blur', validateConfirmPasswordField);

            signupForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Clear all errors
                nameError.classList.remove('show');
                phoneError.classList.remove('show');
                emailError.classList.remove('show');
                passwordError.classList.remove('show');
                confirmPasswordError.classList.remove('show');

                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                let isValid = true;

                // Validate name
                if (!name) {
                    nameError.textContent = 'Name is required';
                    nameError.classList.add('show');
                    isValid = false;
                } else if (name.length < 3) {
                    nameError.textContent = 'Name must be at least 3 characters';
                    nameError.classList.add('show');
                    isValid = false;
                }

                // Validate phone
                if (!phone) {
                    phoneError.textContent = 'Phone number is required';
                    phoneError.classList.add('show');
                    isValid = false;
                } else if (!validatePhone(phone)) {
                    phoneError.textContent = 'Phone number must be exactly 10 digits';
                    phoneError.classList.add('show');
                    isValid = false;
                }

                // Validate email (optional)
                if (email && !validateEmail(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.classList.add('show');
                    isValid = false;
                }

                // Validate password
                if (!password) {
                    passwordError.textContent = 'Password is required';
                    passwordError.classList.add('show');
                    isValid = false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.classList.add('show');
                    isValid = false;
                }

                // Validate confirm password
                if (!confirmPassword) {
                    confirmPasswordError.textContent = 'Please confirm your password';
                    confirmPasswordError.classList.add('show');
                    isValid = false;
                } else if (password !== confirmPassword) {
                    confirmPasswordError.textContent = 'Passwords do not match';
                    confirmPasswordError.classList.add('show');
                    isValid = false;
                }

                if (!isValid) return;

                // Show loading state
                const signupBtn = document.getElementById('signupBtn');
                const originalText = signupBtn.textContent;
                signupBtn.textContent = 'Creating account...';
                signupBtn.disabled = true;

                try {
                    const result = await registerUser(name, phone, email, password);

                    if (result.success) {
                        showToast('Account created successfully! 🎉');
                        setTimeout(() => {
                            window.location.href = '../index.html';
                        }, 1000);
                    } else {
                        phoneError.textContent = result.error;
                        phoneError.classList.add('show');
                        signupBtn.textContent = originalText;
                        signupBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    phoneError.textContent = 'An error occurred. Please try again.';
                    phoneError.classList.add('show');
                    signupBtn.textContent = originalText;
                    signupBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
