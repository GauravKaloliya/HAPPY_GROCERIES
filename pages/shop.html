<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h1 class="section-title">🛍️ Shop All Products</h1>

            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Type and press Enter to search...">
                    <button type="button" id="searchBtn" class="btn-coupon">🔍 Search</button>
                </div>
                
                <div class="filters">
                    <button class="filter-btn active" data-category="All">All</button>
                    <button class="filter-btn" data-category="Fruits">🍎 Fruits</button>
                    <button class="filter-btn" data-category="Vegetables">🥕 Vegetables</button>
                    <button class="filter-btn" data-category="Dairy">🥛 Dairy</button>
                    <button class="filter-btn" data-category="Snacks">🍪 Snacks</button>
                    <button class="filter-btn" data-category="Beverages">🧃 Beverages</button>
                    
                    <select id="sortSelect" class="sort-select">
                        <option value="default">Sort By</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-low">Price (Low to High)</option>
                        <option value="price-high">Price (High to Low)</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>

                <p class="results-count" id="resultsCount"></p>
            </div>

            <div class="products-grid" id="productsGrid"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentQuery = '';
            let currentCategory = 'All';
            let currentSort = 'default';

            loadProducts();

            const searchInput = document.getElementById('searchInput');
            const filterButtons = document.querySelectorAll('.filter-btn');
            const sortSelect = document.getElementById('sortSelect');

            const debouncedSearch = debounce(function(query) {
                currentQuery = query;
                loadProducts();
            }, 500);

            searchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    currentQuery = e.target.value;
                    loadProducts();
                } else {
                    debouncedSearch(e.target.value);
                }
            });

            const searchBtn = document.getElementById('searchBtn');
            if (searchBtn) {
                searchBtn.addEventListener('click', function() {
                    currentQuery = searchInput.value;
                    loadProducts();
                });
            }

            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    loadProducts();
                });
            });

            sortSelect.addEventListener('change', function() {
                currentSort = this.value;
                loadProducts();
            });

            function loadProducts() {
                const products = filterAndSearchProducts(currentQuery, currentCategory, currentSort);
                renderProductGrid(products, 'productsGrid');
                
                const resultsCount = document.getElementById('resultsCount');
                resultsCount.textContent = `${products.length} ${products.length === 1 ? 'item' : 'items'} found`;
            }
        });
    </script>
</body>
</html>
