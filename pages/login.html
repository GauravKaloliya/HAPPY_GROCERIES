<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="auth-container">
        <h2 class="auth-title">Welcome Back! 👋</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone number" required maxlength="10">
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password-btn" id="togglePassword">👁️</button>
                </div>
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn-submit" id="loginBtn">Login</button>

            <div class="auth-link">
                <a href="#" style="color: var(--text-dark); display: block; margin-bottom: 1rem;">Forgot Password?</a>
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (isUserLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const phoneInput = document.getElementById('phone');
            const passwordInput = document.getElementById('password');
            const phoneError = document.getElementById('phoneError');
            const passwordError = document.getElementById('passwordError');
            const togglePasswordBtn = document.getElementById('togglePassword');

            phoneInput.addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
            });

            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
            });

            // Real-time validation
            phoneInput.addEventListener('blur', function() {
                const phone = phoneInput.value.trim();
                if (phone && !validatePhone(phone)) {
                    phoneError.textContent = 'Phone number must be exactly 10 digits';
                    phoneError.classList.add('show');
                } else {
                    phoneError.classList.remove('show');
                }
            });

            passwordInput.addEventListener('blur', function() {
                const password = passwordInput.value;
                if (password && password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.classList.add('show');
                } else {
                    passwordError.classList.remove('show');
                }
            });

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                phoneError.classList.remove('show');
                passwordError.classList.remove('show');

                const phone = phoneInput.value.trim();
                const password = passwordInput.value;

                let isValid = true;

                // Validate phone
                if (!phone) {
                    phoneError.textContent = 'Phone number is required';
                    phoneError.classList.add('show');
                    isValid = false;
                } else if (!validatePhone(phone)) {
                    phoneError.textContent = 'Phone number must be exactly 10 digits';
                    phoneError.classList.add('show');
                    isValid = false;
                }

                // Validate password
                if (!password) {
                    passwordError.textContent = 'Password is required';
                    passwordError.classList.add('show');
                    isValid = false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.classList.add('show');
                    isValid = false;
                }

                if (!isValid) return;

                // Show loading state
                const loginBtn = document.getElementById('loginBtn');
                const originalText = loginBtn.textContent;
                loginBtn.textContent = 'Logging in...';
                loginBtn.disabled = true;

                try {
                    const result = await loginUser(phone, password);

                    if (result.success) {
                        showToast('Login successful! 🎉');
                        setTimeout(() => {
                            window.location.href = '../index.html';
                        }, 1000);
                    } else {
                        passwordError.textContent = result.error;
                        passwordError.classList.add('show');
                        loginBtn.textContent = originalText;
                        loginBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    passwordError.textContent = 'An error occurred. Please try again.';
                    passwordError.classList.add('show');
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
