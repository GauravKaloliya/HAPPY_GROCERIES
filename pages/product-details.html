<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <div class="product-details-header">
                <a href="shop.html" class="btn-secondary">← Back to Shop</a>
                <div class="share-actions">
                    <button class="btn-secondary" id="shareBtn" type="button">🔗 Share</button>
                    <button class="btn-secondary" id="copyLinkBtn" type="button">📋 Copy Link</button>
                </div>
            </div>

            <div id="productDetailsRoot"></div>

            <section id="relatedSection" style="display: none;">
                <h2 class="section-title" style="margin-top: 3rem;">🧡 Related Products</h2>
                <div class="products-grid" id="relatedProductsGrid"></div>
            </section>

            <section class="reviews-section">
                <h2 class="section-title">📝 Reviews</h2>
                <div class="reviews-grid" id="reviewsGrid"></div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/product-details.js"></script>
</body>
</html>
