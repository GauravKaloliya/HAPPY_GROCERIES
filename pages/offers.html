<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Coupons - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h1 class="section-title">🎉 Offers & Coupons</h1>

            <div class="offers-container">
                <div class="offers-header">
                    <p>Save big on your groceries! Apply these coupons at checkout and enjoy amazing discounts.</p>
                </div>

                <div id="couponsList"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Available coupons - defined here to ensure visibility
        const AVAILABLE_COUPONS = [
            {
                code: 'SAVE20',
                description: '20% off orders above ₹500',
                type: 'percentage',
                value: 20,
                minOrderValue: 500,
                maxDiscount: 100,
                active: true,
                expiryDate: '2027-12-31'
            },
            {
                code: 'FRESH15',
                description: '15% off on fruits & vegetables',
                type: 'category',
                value: 15,
                applicableCategories: ['Fruits', 'Vegetables'],
                minOrderValue: 200,
                maxDiscount: 75,
                active: true,
                expiryDate: '2027-12-31'
            },
            {
                code: 'WELCOME50',
                description: '₹50 off first order',
                type: 'fixed',
                value: 50,
                minOrderValue: 300,
                maxDiscount: 50,
                active: true,
                expiryDate: '2027-12-31',
                firstOrderOnly: true
            },
            {
                code: 'DAIRY10',
                description: '10% off on dairy products',
                type: 'category',
                value: 10,
                applicableCategories: ['Dairy'],
                minOrderValue: 150,
                maxDiscount: 50,
                active: true,
                expiryDate: '2027-12-31'
            },
            {
                code: 'SNACKS25',
                description: '₹25 off snacks orders',
                type: 'fixed',
                value: 25,
                applicableCategories: ['Snacks'],
                minOrderValue: 100,
                maxDiscount: 25,
                active: true,
                expiryDate: '2027-12-31'
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            loadCoupons();
        });

        function loadCoupons() {
            const couponsList = document.getElementById('couponsList');
            if (!couponsList) return;

            const activeCoupons = AVAILABLE_COUPONS.filter(c => c.active);

            if (activeCoupons.length === 0) {
                couponsList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">🎫</div>
                        <h3>No active coupons</h3>
                        <p>Check back later for new offers!</p>
                    </div>
                `;
                return;
            }

            couponsList.innerHTML = activeCoupons.map(coupon => {
                const categoryText = coupon.applicableCategories 
                    ? `Applicable to: ${coupon.applicableCategories.join(', ')}` 
                    : 'Applicable to: All products';

                const isExpired = new Date(coupon.expiryDate) < new Date();

                return `
                <div class="coupon-card ${isExpired ? 'expired' : ''}">
                    <div class="coupon-header">
                        <h3 class="coupon-code">${coupon.code}</h3>
                    </div>
                    <div class="coupon-body">
                        <p class="coupon-description">${coupon.description}</p>
                        <p class="coupon-details">${categoryText}</p>
                        <div class="coupon-info">
                            <span class="coupon-info-item">
                                <strong>Minimum Order:</strong> ₹${coupon.minOrderValue}
                            </span>
                            ${coupon.type === 'percentage' ? `
                            <span class="coupon-info-item">
                                <strong>Max Discount:</strong> ₹${coupon.maxDiscount}
                            </span>
                            ` : ''}
                            <span class="coupon-info-item">
                                <strong>Expires:</strong> ${new Date(coupon.expiryDate).toLocaleDateString()}
                            </span>
                        </div>
                    </div>
                    <div class="coupon-footer">
                        <button class="btn-copy-coupon" data-code="${coupon.code}" ${isExpired ? 'disabled' : ''}>
                            ${isExpired ? 'Expired' : 'Copy Code'}
                        </button>
                    </div>
                </div>
            `}).join('');

            setupCouponButtons();
        }

        function setupCouponButtons() {
            document.querySelectorAll('.btn-copy-coupon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const code = this.dataset.code;
                    if (!code || this.disabled) return;

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(code).then(() => {
                            showToast(`Coupon ${code} copied to clipboard! 📋`);
                            this.textContent = 'Copied!';
                            setTimeout(() => {
                                this.textContent = 'Copy Code';
                            }, 2000);
                        }).catch(err => {
                            fallbackCopy(code, this);
                        });
                    } else {
                        fallbackCopy(code, this);
                    }
                });
            });
        }

        function fallbackCopy(code, btn) {
            const textArea = document.createElement('textarea');
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(`Coupon ${code} copied to clipboard! 📋`);
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                }, 2000);
            } catch (err) {
                showToast('Failed to copy code. Please copy manually.');
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
