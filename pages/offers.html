<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Coupons - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h1 class="section-title">🎉 Offers & Coupons</h1>

            <div class="offers-container">
                <div class="offers-header">
                    <p>Save big on your groceries! Apply these coupons at checkout and enjoy amazing discounts.</p>
                </div>

                <div id="couponsList"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCoupons();
        });

        function loadCoupons() {
            const couponsList = document.getElementById('couponsList');
            const allCoupons = getAllCoupons();

            const activeCoupons = allCoupons.filter(c => c.active);

            couponsList.innerHTML = activeCoupons.map(coupon => {
                const categoryText = coupon.applicableCategories 
                    ? `Applicable to: ${coupon.applicableCategories.join(', ')}` 
                    : 'Applicable to: All products';

                const weekendOnly = coupon.code === 'WEEKEND30' 
                    ? '<span class="weekend-tag">Weekend Only</span>' 
                    : '';

                return `
                <div class="coupon-card">
                    <div class="coupon-header">
                        <h3 class="coupon-code">${coupon.code}</h3>
                        ${weekendOnly}
                    </div>
                    <div class="coupon-body">
                        <p class="coupon-description">${coupon.description}</p>
                        <p class="coupon-details">${categoryText}</p>
                        <div class="coupon-info">
                            <span class="coupon-info-item">
                                <strong>Minimum Order:</strong> ₹${coupon.minOrderValue}
                            </span>
                            ${coupon.type === 'percentage' ? `
                            <span class="coupon-info-item">
                                <strong>Max Discount:</strong> ₹${coupon.maxDiscount}
                            </span>
                            ` : ''}
                            <span class="coupon-info-item">
                                <strong>Expires:</strong> ${new Date(coupon.expiryDate).toLocaleDateString()}
                            </span>
                        </div>
                    </div>
                    <div class="coupon-footer">
                        <button class="btn-copy-coupon" data-code="${coupon.code}">
                            Copy Code
                        </button>
                    </div>
                </div>
            `}).join('');

            setupCouponButtons();
        }

        function setupCouponButtons() {
            document.querySelectorAll('.btn-copy-coupon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const code = this.dataset.code;
                    navigator.clipboard.writeText(code).then(() => {
                        showToast(`Coupon ${code} copied to clipboard! 📋`);
                        this.textContent = 'Copied!';
                        setTimeout(() => {
                            this.textContent = 'Copy Code';
                        }, 2000);
                    }).catch(err => {
                        showToast('Failed to copy code');
                    });
                });
            });
        }
    </script>
</body>
</html>
