<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Coupons - Happy Groceries 🛒</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h1 class="section-title">🎉 Offers & Coupons</h1>

            <div class="offers-container">
                <div class="offers-header">
                    <p>Save big on your groceries! Apply these coupons at checkout and enjoy amazing discounts.</p>
                </div>

                <div id="couponsList"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/layout-loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // API base URL - adjust based on your backend deployment
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://your-production-api.com';

        document.addEventListener('DOMContentLoaded', function() {
            loadCoupons();
        });

        async function loadCoupons() {
            const couponsList = document.getElementById('couponsList');
            if (!couponsList) return;

            // Show loading state
            couponsList.innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="loading-emoji">🔄</div>
                    <h3>Loading coupons...</h3>
                </div>
            `;

            try {
                // Fetch coupons from backend API
                const response = await fetch(`${API_BASE_URL}/api/coupons/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch coupons');
                }

                const coupons = await response.json();

                if (!coupons || coupons.length === 0) {
                    couponsList.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-state-icon">🎫</div>
                            <h3>No active coupons</h3>
                            <p>Check back later for new offers!</p>
                        </div>
                    `;
                    return;
                }

                couponsList.innerHTML = coupons.map(coupon => {
                    const categoryText = coupon.applicable_categories 
                        ? `Applicable to: ${coupon.applicable_categories.join(', ')}` 
                        : 'Applicable to: All products';

                    const expiryDate = coupon.valid_until || coupon.expiry_date;
                    const isExpired = expiryDate ? new Date(expiryDate) < new Date() : false;
                    const couponType = coupon.coupon_type || coupon.type || 'fixed';
                    const maxDiscount = coupon.max_discount || coupon.maxDiscount;

                    return `
                    <div class="coupon-card ${isExpired ? 'expired' : ''}">
                        <div class="coupon-header">
                            <h3 class="coupon-code">${coupon.code}</h3>
                        </div>
                        <div class="coupon-body">
                            <p class="coupon-description">${coupon.description}</p>
                            <p class="coupon-details">${categoryText}</p>
                            <div class="coupon-info">
                                <span class="coupon-info-item">
                                    <strong>Minimum Order:</strong> ₹${coupon.min_order_value || coupon.minOrderValue || 0}
                                </span>
                                ${couponType === 'percentage' && maxDiscount ? `
                                <span class="coupon-info-item">
                                    <strong>Max Discount:</strong> ₹${maxDiscount}
                                </span>
                                ` : ''}
                                ${expiryDate ? `
                                <span class="coupon-info-item">
                                    <strong>Expires:</strong> ${new Date(expiryDate).toLocaleDateString()}
                                </span>
                                ` : ''}
                            </div>
                        </div>
                        <div class="coupon-footer">
                            <button class="btn-copy-coupon" data-code="${coupon.code}" ${isExpired ? 'disabled' : ''}>
                                ${isExpired ? 'Expired' : 'Copy Code'}
                            </button>
                        </div>
                    </div>
                `}).join('');

                setupCouponButtons();
            } catch (error) {
                console.error('Error loading coupons:', error);
                couponsList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Failed to load coupons</h3>
                        <p>Please try again later. Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        function setupCouponButtons() {
            document.querySelectorAll('.btn-copy-coupon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const code = this.dataset.code;
                    if (!code || this.disabled) return;

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(code).then(() => {
                            showToast(`Coupon ${code} copied to clipboard! 📋`);
                            this.textContent = 'Copied!';
                            setTimeout(() => {
                                this.textContent = 'Copy Code';
                            }, 2000);
                        }).catch(err => {
                            fallbackCopy(code, this);
                        });
                    } else {
                        fallbackCopy(code, this);
                    }
                });
            });
        }

        function fallbackCopy(code, btn) {
            const textArea = document.createElement('textarea');
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(`Coupon ${code} copied to clipboard! 📋`);
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                }, 2000);
            } catch (err) {
                showToast('Failed to copy code. Please copy manually.');
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
