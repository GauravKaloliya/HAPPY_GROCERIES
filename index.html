<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Groceries 🛒 - Fresh & Happy Shopping</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="floating-icons">
                    <span class="float-icon" style="--delay: 0s;">🍎</span>
                    <span class="float-icon" style="--delay: 1s;">🥕</span>
                    <span class="float-icon" style="--delay: 2s;">🛒</span>
                    <span class="float-icon" style="--delay: 0.5s;">🥛</span>
                    <span class="float-icon" style="--delay: 1.5s;">🍪</span>
                    <span class="float-icon" style="--delay: 2.5s;">🧃</span>
                </div>
                <h1 class="hero-title">Fresh & Happy 🛍️</h1>
                <p class="hero-subtitle">Your favorite groceries delivered with love!</p>
                <a href="pages/shop.html" class="btn-primary btn-hero">Shop Now</a>
            </div>
        </section>

        <section class="featured-section">
            <div class="container">
                <h2 class="section-title">✨ Featured Products</h2>
                <div class="products-grid" id="featuredProducts">
                </div>
            </div>
        </section>

        <section class="categories-preview">
            <div class="container">
                <h2 class="section-title">🎨 Shop by Category</h2>
                <div class="categories-grid">
                    <a href="pages/categories.html?category=Fruits" class="category-card" style="background: var(--primary-pink);">
                        <span class="category-emoji">🍎</span>
                        <h3>Fruits</h3>
                    </a>
                    <a href="pages/categories.html?category=Vegetables" class="category-card" style="background: var(--primary-green);">
                        <span class="category-emoji">🥕</span>
                        <h3>Vegetables</h3>
                    </a>
                    <a href="pages/categories.html?category=Dairy" class="category-card" style="background: var(--primary-blue);">
                        <span class="category-emoji">🥛</span>
                        <h3>Dairy</h3>
                    </a>
                    <a href="pages/categories.html?category=Snacks" class="category-card" style="background: var(--primary-yellow);">
                        <span class="category-emoji">🍪</span>
                        <h3>Snacks</h3>
                    </a>
                    <a href="pages/categories.html?category=Beverages" class="category-card" style="background: var(--primary-orange);">
                        <span class="category-emoji">🧃</span>
                        <h3>Beverages</h3>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <div class="toast" id="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/security.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/session.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/layout-loader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
