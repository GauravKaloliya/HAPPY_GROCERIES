services:
  - type: web
    name: wad-project-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && ENVIRONMENT=production python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --access-logfile - --error-logfile -
    healthCheckPath: /health/
    envVars:
      - key: ENVIRONMENT
        value: production
